<svg viewBox="0 0 130 150" xmlns="http://www.w3.org/2000/svg">
  <title>Front Left Door Open</title>
  <!-- Car body (top-down view, front at top) -->
  <rect x="38" y="10" width="60" height="120" rx="8" fill="#e0e0e0" stroke="#111" stroke-width="3.5"/>
  <!-- Windscreen / A-pillar line -->
  <line x1="38" y1="36" x2="98" y2="36" stroke="#111" stroke-width="2"/>
  <!-- B-pillar -->
  <line x1="38" y1="82" x2="98" y2="82" stroke="#111" stroke-width="2"/>
  <!-- Rear window -->
  <line x1="38" y1="114" x2="98" y2="114" stroke="#111" stroke-width="2"/>
  <!-- Trunk lid line -->
  <line x1="42" y1="124" x2="94" y2="124" stroke="#111" stroke-width="1.5"/>
  <!-- Open front-left door (perpendicular, hinged at A-pillar / x=38) -->
  <rect x="8" y="36" width="30" height="46" rx="3" fill="#444" stroke="#111" stroke-width="2"/>
</svg>
