<svg viewBox="0 0 130 150" xmlns="http://www.w3.org/2000/svg">
  <title>Front Right Door Open</title>
  <!-- Car body (top-down view, front at top) -->
  <rect x="32" y="10" width="60" height="120" rx="8" fill="#e0e0e0" stroke="#111" stroke-width="3.5"/>
  <!-- Windscreen / A-pillar line -->
  <line x1="32" y1="36" x2="92" y2="36" stroke="#111" stroke-width="2"/>
  <!-- B-pillar -->
  <line x1="32" y1="82" x2="92" y2="82" stroke="#111" stroke-width="2"/>
  <!-- Rear window -->
  <line x1="32" y1="114" x2="92" y2="114" stroke="#111" stroke-width="2"/>
  <!-- Trunk lid line -->
  <line x1="36" y1="124" x2="88" y2="124" stroke="#111" stroke-width="1.5"/>
  <!-- Open front-right door (perpendicular, hinged at A-pillar / x=92) -->
  <rect x="92" y="36" width="30" height="46" rx="3" fill="#444" stroke="#111" stroke-width="2"/>
</svg>
